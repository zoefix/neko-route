name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.2"
        required: true
        default: "v0.1.2"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            asset_dir: macos-x64
            asset_os: macos
            asset_arch: x64
            bundles: app
          - label: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin
            platform: macos
            asset_dir: macos-arm64
            asset_os: macos
            asset_arch: arm64
            bundles: app
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            asset_dir: windows-x64
            asset_os: windows
            asset_arch: x64
            bundles: nsis
          - label: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
            asset_dir: windows-arm64
            asset_os: windows
            asset_arch: arm64
            bundles: nsis
          - label: Linux amd64 deb
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            asset_dir: linux-amd64
            asset_os: linux
            asset_arch: amd64
            bundles: deb
          - label: Linux arm64 deb
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            asset_dir: linux-arm64
            asset_os: linux
            asset_arch: arm64
            bundles: deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            patchelf \
            pkg-config

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          node -e 'const p=require("./package.json"); const t=require("./src-tauri/tauri.conf.json"); const v=process.argv[1]; if (p.version !== v || t.version !== v) { console.error(`Tag version ${v} does not match package ${p.version} / tauri ${t.version}`); process.exit(1); }' "$VERSION"

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: Stage macOS assets
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          OUT_DIR="release/${{ matrix.asset_dir }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [[ ! -d "$BUNDLE_DIR" ]]; then
            BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          fi
          APP_PATH="$BUNDLE_DIR/Neko Route.app"
          TAR_PATH="$BUNDLE_DIR/Neko Route.app.tar.gz"
          mkdir -p "$OUT_DIR" release-dmg/staging
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          cp -R "$APP_PATH" release-dmg/staging/
          ln -s /Applications release-dmg/staging/Applications
          DMG_NAME="Neko-Route_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}.dmg"
          hdiutil create \
            -volname "Neko Route" \
            -srcfolder release-dmg/staging \
            -ov \
            -format UDZO \
            "$OUT_DIR/$DMG_NAME"
          TAR_NAME="Neko-Route_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}.app.tar.gz"
          cp "$TAR_PATH" "$OUT_DIR/$TAR_NAME"
          cp "${TAR_PATH}.sig" "$OUT_DIR/${TAR_NAME}.sig"

      - name: Stage Windows assets
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          OUT_DIR="release/${{ matrix.asset_dir }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          mkdir -p "$OUT_DIR"
          EXE_PATH="$(find "$BUNDLE_DIR" -maxdepth 1 -type f -name '*setup.exe' -print -quit)"
          EXE_NAME="Neko-Route_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}-setup.exe"
          cp "$EXE_PATH" "$OUT_DIR/$EXE_NAME"
          cp "${EXE_PATH}.sig" "$OUT_DIR/${EXE_NAME}.sig"

      - name: Stage Linux assets
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          OUT_DIR="release/${{ matrix.asset_dir }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/deb"
          mkdir -p "$OUT_DIR"
          DEB_PATH="$(find "$BUNDLE_DIR" -maxdepth 1 -type f -name '*.deb' -print -quit)"
          DEB_NAME="Neko-Route_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}.deb"
          cp "$DEB_PATH" "$OUT_DIR/$DEB_NAME"
          cp "${DEB_PATH}.sig" "$OUT_DIR/${DEB_NAME}.sig"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_dir }}
          path: release/${{ matrix.asset_dir }}/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publish release and updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          PUBLISH_RELEASE: "1"
        run: scripts/prepare-updater-release.sh "$GITHUB_RELEASE_TAG"
